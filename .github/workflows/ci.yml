name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      # Trained models (artifacts/*.pkl) + sample fixture are committed, so the
      # full suite runs. With no GROQ_API_KEY the agents use the heuristic
      # fallback; SQLite needs no configuration. The suite is self-contained.
      - run: pytest tests/ -v
        env:
          PYTHONIOENCODING: utf-8
