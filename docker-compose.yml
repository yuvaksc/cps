# Full stack, one command:  docker compose up --build
# Reads secrets from .env (SUPABASE_*, GROQ_*). The frontend's NEXT_PUBLIC_*
# are inlined at build time and must be reachable from the BROWSER, hence
# localhost rather than the internal "api" service name.
services:
  api:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      - CORS_ORIGINS=http://localhost:3000

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000
        NEXT_PUBLIC_API_WS_URL: ws://localhost:8000/ws/sensor-stream
        NEXT_PUBLIC_SUPABASE_URL: ${SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
    ports:
      - "3000:3000"
    depends_on:
      - api
